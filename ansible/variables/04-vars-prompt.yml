---
- name: Demo - vars_prompt for runtime input
  hosts: localhost
  connection: local
  gather_facts: false

  vars_prompt:
    - name: username
      prompt: "Please enter your username"
      private: false
    - name: password
      prompt: "Please enter your password"
      private: true

  tasks:
    - name: Explain prompt values without exposing password
      ansible.builtin.debug:
        msg: "Username provided: {{ username }}. Password was captured securely (hidden input)."
