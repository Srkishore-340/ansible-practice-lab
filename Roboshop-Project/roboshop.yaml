- name: Create ec2 and r53 records
  hosts: all 
  connection: local
  vars:
    sg_id: sg-04d26ebef6a9e9ddc
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    instances:
    - mangodb
    - catalogue

  tasks: 
  - name: create ec2 instance
    amazon.aws.ec2.instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }} - {{ env }} "
      tags:
        project: roboshop
        component: "{{ item }}"
        Environment : "{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    


    
